version: '3.8'

services:
  egea-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: egea-main-control
    ports:
      - "3000:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - egea-network

networks:
  egea-network:
    driver: bridge
